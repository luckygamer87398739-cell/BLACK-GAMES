<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome - BLACK GAME</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#05010f,#18002d,#2d0057,#10001d);
    overflow:hidden;
}

/* Animated Background */
body::before{
    content:"";
    position:absolute;
    width:700px;
    height:700px;
    background:radial-gradient(circle,#8a2be2 0%,transparent 70%);
    filter:blur(120px);
    animation:move 8s infinite alternate;
}

@keyframes move{
    from{transform:translate(-150px,-100px);}
    to{transform:translate(180px,120px);}
}

/* Floating Particles */
span{
    position:absolute;
    width:4px;
    height:4px;
    background:#c77dff;
    border-radius:50%;
    box-shadow:0 0 12px #c77dff;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(0);
        opacity:0;
    }
    to{
        transform:translateY(-100px) scale(1.5);
        opacity:1;
    }
}

.container{
    position:relative;
    z-index:10;
    text-align:center;
    padding:60px;
    border-radius:25px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.2);
    box-shadow:0 0 60px rgba(162,89,255,.5);
}

h1{
    font-size:60px;
    color:#fff;
    letter-spacing:4px;
    text-shadow:
    0 0 10px #b266ff,
    0 0 25px #b266ff,
    0 0 45px #8a2be2,
    0 0 70px #8a2be2;
    animation:pulse 2s infinite;
}

p{
    margin-top:20px;
    color:#ddd;
    font-size:22px;
    letter-spacing:2px;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.08);
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>WELCOME BLACK GAME</h1>
    <p>Purple Neon Experience</p>
</div>

<script>
for(let i=0;i<80;i++){
    let star=document.createElement("span");
    star.style.left=Math.random()*100+"vw";
    star.style.animationDuration=(5+Math.random()*6)+"s";
    star.style.animationDelay=Math.random()*5+"s";
    document.body.appendChild(star);
}
</script>

</body>
</html>
